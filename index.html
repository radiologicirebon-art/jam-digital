<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Papan Informasi Digital - Masjid Jami' Al Radiologi</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
margin:0;
font-family:Verdana;
background:linear-gradient(135deg,#065f46,#022c22);
color:white;
text-align:center;
overflow:hidden;
}
h1{
font-size:50px;
margin-top:20px;
}
.clock{
font-size:90px;
font-weight:bold;
margin:20px;
color:#00ffcc;
}
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
width:90%;
margin:0 auto;
}
.box{
background:#064e3b;
padding:30px;
border-radius:15px;
font-size:40px;
box-shadow:0 0 20px rgba(0,255,200,0.5);
}
.marquee{
position:absolute;
bottom:0;
width:100%;
background:#022c22;
padding:20px;
font-size:30px;
white-space:nowrap;
overflow:hidden;
}
.marquee span{
display:inline-block;
padding-left:100%;
animation:scroll 20s linear infinite;
}
@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-100%);}
}
</style>
</head>
<body>

<h1>🕌 MASJID JAMI' AL RADIOLOGI</h1>
<div class="clock" id="clock"></div>

<div class="grid">
<div class="box">IMSAK<br>04:26</div>
<div class="box">SUBUH<br>04:36</div>
<div class="box">DZUHUR<br>12:01</div>
<div class="box">ASHAR<br>15:02</div>
<div class="box">MAGHRIB<br>18:07</div>
<div class="box">ISYA<br>19:16</div>
</div>

<div class="marquee">
<span>
Jadwal Sholat Ramadhan 1447 H • Matikan HP Saat Sholat • Luruskan dan Rapatkan Shaf
</span>
</div>

<script>
function updateClock(){
const now=new Date();
document.getElementById("clock").innerText=
now.toLocaleTimeString("id-ID");
}
setInterval(updateClock,1000);
updateClock();
</script>

</body>
</html>

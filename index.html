<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masjid Jami Al-Firdaus PRO MAX</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0f172a;
  color:white;
  text-align:center;
  transition:0.5s;
}
.night{ background:#000814; }

.header{ font-size:45px; padding:20px; font-weight:bold; }
.clock{ font-size:70px; }
.date{ font-size:24px; margin-bottom:15px; }

.container{
  display:flex;
  justify-content:space-around;
  margin-top:20px;
}
.card{
  background:#1e293b;
  padding:20px;
  border-radius:20px;
  width:15%;
}
.card h2{ margin:0; font-size:22px; }
.card p{ font-size:28px; margin-top:10px; }

.countdown{ font-size:45px; margin-top:20px; color:#00ffcc; }
.jumat{ font-size:22px; margin-top:10px; color:#ffd700; }

.hadits{
  position:absolute;
  bottom:70px;
  width:100%;
  font-size:20px;
}

.running-text{
  position:fixed;
  bottom:0;
  width:100%;
  background:#111;
  padding:10px;
  font-size:18px;
}

.qibla{
  position:absolute;
  top:15px;
  right:20px;
  font-size:35px;
  animation:spin 10s linear infinite;
}
@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

/* ===== ADMIN PANEL ===== */
.admin-btn{
  position:fixed;
  top:10px;
  left:10px;
  background:#00c896;
  padding:8px 15px;
  border-radius:10px;
  cursor:pointer;
}
#adminPanel{
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:#0f172a;
  overflow:auto;
  padding:30px;
}
input, textarea, button{
  width:90%;
  padding:12px;
  margin:8px;
  border-radius:8px;
  border:none;
}
button{ background:#00c896; color:white; cursor:pointer; }
.box{
  background:#1e293b;
  padding:15px;
  border-radius:15px;
  margin-bottom:20px;
}
</style>
</head>

<body>

<div class="admin-btn" onclick="showLogin()">ADMIN</div>

<div class="header">🕌 Masjid Jami Al-Firdaus</div>
<div class="clock" id="clock"></div>
<div class="date" id="date"></div>

<div class="container" id="jadwal"></div>
<div class="countdown" id="countdown"></div>
<div class="jumat" id="jumat"></div>
<div class="hadits" id="hadits"></div>

<div class="running-text">
<marquee id="marquee" scrollamount="8">
Selamat datang di Masjid Jami Al-Firdaus
</marquee>
</div>

<div class="qibla">🧭</div>

<audio id="adzan" src="https://cdn.islamic.network/audio/adhan/adhan1.mp3"></audio>

<!-- ================= ADMIN PANEL ================= -->
<div id="adminPanel">

<h2>🔐 Login Admin</h2>
<div id="loginBox">
<input type="text" id="user" placeholder="Username">
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">LOGIN</button>
</div>

<div id="adminContent" style="display:none;">

<div class="box">
<h3>📢 Running Text</h3>
<textarea id="running"></textarea>
<button onclick="saveRunning()">Simpan</button>
</div>

<div class="box">
<h3>🗣 Pengumuman</h3>
<textarea id="pengumuman"></textarea>
<button onclick="savePengumuman()">Simpan</button>
</div>

<div class="box">
<h3>🕌 Petugas Jumat</h3>
<input type="text" id="khatib" placeholder="Khatib">
<input type="text" id="imam" placeholder="Imam">
<input type="text" id="muadzin" placeholder="Muadzin">
<button onclick="savePetugas()">Simpan</button>
</div>

<button onclick="closeAdmin()">Tutup</button>

</div>
</div>

<!-- ================= FIREBASE ================= -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
databaseURL: "https://masjid-99bca-default-rtdb.asia-southeast1.firebasedatabase.app/"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ===== REALTIME DATA ===== */
db.ref("running_text").on("value", snap=>{
 if(snap.exists()) document.getElementById("marquee").innerText = snap.val();
});
db.ref("pengumuman").on("value", snap=>{
 if(snap.exists()) document.getElementById("hadits").innerText = snap.val();
});
db.ref("petugas_jumat").on("value", snap=>{
 if(snap.exists()){
  const d = snap.val();
  document.getElementById("jumat").innerText =
  "🕌 KHATIB: "+d.khatib+" | IMAM: "+d.imam+" | MUADZIN: "+d.muadzin;
 }
});

/* ===== LOGIN ===== */
function showLogin(){ document.getElementById("adminPanel").style.display="block"; }
function closeAdmin(){ document.getElementById("adminPanel").style.display="none"; }

function login(){
 if(document.getElementById("user").value==="201708073" &&
    document.getElementById("pass").value==="Papamama00"){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("adminContent").style.display="block";
 } else { alert("Login Salah"); }
}

/* ===== SAVE DATA ===== */
function saveRunning(){
 db.ref("running_text").set(document.getElementById("running").value);
 alert("Updated!");
}
function savePengumuman(){
 db.ref("pengumuman").set(document.getElementById("pengumuman").value);
 alert("Updated!");
}
function savePetugas(){
 db.ref("petugas_jumat").set({
   khatib:document.getElementById("khatib").value,
   imam:document.getElementById("imam").value,
   muadzin:document.getElementById("muadzin").value
 });
 alert("Updated!");
}

/* ===== CLOCK ===== */
setInterval(()=>{
 const now=new Date();
 document.getElementById("clock").innerText=
 now.toLocaleTimeString("id-ID");
 document.getElementById("date").innerText=
 now.toLocaleDateString("id-ID",
 {weekday:'long', year:'numeric', month:'long', day:'numeric'});
},1000);

/* ===== JADWAL SHOLAT ===== */
const city="Cirebon";
let prayerTimes={};

async function getJadwal(){
 const url=`https://api.aladhan.com/v1/timingsByCity?city=${city}&country=Indonesia&method=11`;
 const res=await fetch(url);
 const data=await res.json();
 prayerTimes=data.data.timings;
 renderJadwal();
}
function renderJadwal(){
 const c=document.getElementById("jadwal");
 c.innerHTML="";
 ["Fajr","Dhuhr","Asr","Maghrib","Isha"].forEach(p=>{
  const div=document.createElement("div");
  div.className="card";
  div.innerHTML=`<h2>${p}</h2><p>${prayerTimes[p]}</p>`;
  c.appendChild(div);
 });
}
getJadwal();

/* ===== COUNTDOWN ===== */
setInterval(()=>{
 if(!prayerTimes.Fajr) return;
 const now=new Date();
 for(let p of ["Fajr","Dhuhr","Asr","Maghrib","Isha"]){
  const [h,m]=prayerTimes[p].split(":");
  const t=new Date();
  t.setHours(h,m,0);
  if(now<t){
   const diff=t-now;
   const min=Math.floor(diff/60000);
   const sec=Math.floor((diff%60000)/1000);
   document.getElementById("countdown").innerText=
   "Menuju "+p+": "+min+"m "+sec+"s";
   if(min===0 && sec===0){
    document.getElementById("adzan").play();
   }
   break;
  }
 }
},1000);
</script>

</body>
</html>

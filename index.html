<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masjid Jami Al - Firdaus</title>

  
<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0f172a;
  color:white;
  text-align:center;
  overflow:hidden;
  transition:0.5s;
}
.night{
  background:#000814;
}
.header{
  font-size:50px;
  padding:20px;
  font-weight:bold;
}
.clock{
  font-size:80px;
}
.date{
  font-size:28px;
  margin-bottom:20px;
}
.container{
  display:flex;
  justify-content:space-around;
  margin-top:20px;
}
.card{
  background:#1e293b;
  padding:25px;
  border-radius:20px;
  width:15%;
}
.card h2{
  margin:0;
  font-size:26px;
}
.card p{
  font-size:34px;
  margin-top:10px;
}
.countdown{
  font-size:55px;
  margin-top:25px;
  color:#00ffcc;
}
.hadits{
  position:absolute;
  bottom:60px;
  width:100%;
  font-size:22px;
  opacity:0.9;
}
.qibla{
  position:absolute;
  top:20px;
  right:20px;
  font-size:40px;
  animation:spin 10s linear infinite;
}
@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}
.jumat{
  font-size:28px;
  margin-top:15px;
  color:#ffd700;
}
.running-text{
  position:absolute;
  bottom:0;
  width:100%;
  background:#111;
  padding:10px;
  font-size:22px;
}
</style>
</head>

<body>

<div class="header">🕌 Masjid Jami Al - Firdaus</div>
<div class="clock" id="clock"></div>
<div class="date" id="date"></div>

<div class="container" id="jadwal"></div>

<div class="countdown" id="countdown"></div>
<div class="jumat" id="jumat"></div>

<div class="hadits" id="hadits"></div>

<div class="running-text">
  <marquee id="marquee" scrollamount="8">
    Selamat datang di Masjid Jami Al - Firdaus • Matikan HP saat sholat • Luruskan dan rapatkan shaf •
  </marquee>
</div>

<div class="qibla">🧭</div>

<audio id="adzan" src="https://cdn.islamic.network/audio/adhan/adhan1.mp3"></audio>

<script>
const city = "Cirebon";
let prayerTimes = {};
let nextPrayer = "";
let adzanPlayed = false;

// ================= CLOCK =================
function updateClock(){
  const now = new Date();
  document.getElementById("clock").innerText =
    now.toLocaleTimeString("id-ID");
  document.getElementById("date").innerText =
    now.toLocaleDateString("id-ID",
    {weekday:'long', year:'numeric', month:'long', day:'numeric'});
}
setInterval(updateClock,1000);

// ================= API JADWAL =================
async function getJadwal(){
  const url = `https://api.aladhan.com/v1/timingsByCity?city=${city}&country=Indonesia&method=11`;
  const res = await fetch(url);
  const data = await res.json();
  prayerTimes = data.data.timings;
  renderJadwal();
}
function renderJadwal(){
  const container = document.getElementById("jadwal");
  container.innerHTML="";
  const list=["Fajr","Dhuhr","Asr","Maghrib","Isha"];
  list.forEach(p=>{
    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`<h2>${p}</h2><p>${prayerTimes[p]}</p>`;
    container.appendChild(div);
  });
}
getJadwal();

// ================= COUNTDOWN =================
function checkNextPrayer(){
  const now=new Date();
  const list=["Fajr","Dhuhr","Asr","Maghrib","Isha"];

  for(let p of list){
    if(!prayerTimes[p]) return;

    const [h,m]=prayerTimes[p].split(":");
    const prayerTime=new Date();
    prayerTime.setHours(h,m,0);

    if(now < prayerTime){
      nextPrayer=p;
      const diff=prayerTime-now;
      const min=Math.floor(diff/60000);
      const sec=Math.floor((diff%60000)/1000);

      document.getElementById("countdown").innerText =
        `Menuju ${nextPrayer}: ${min}m ${sec}s`;

      if(min<=10){
        document.body.classList.add("night");
      }

      if(min===0 && sec===0 && !adzanPlayed){
        document.getElementById("adzan").play();
        adzanPlayed=true;
      }
      return;
    }
  }
}
setInterval(checkNextPrayer,1000);

// ================= HADITS =================
function haditsHarian(){
  const list=[
    "Sebaik-baik kalian adalah yang belajar Al-Qur'an dan mengajarkannya.",
    "Shalat adalah tiang agama.",
    "Kebersihan adalah sebagian dari iman."
  ];
  const rand=list[Math.floor(Math.random()*list.length)];
  document.getElementById("hadits").innerText=rand;
}
haditsHarian();

// ================= MODE MALAM =================
setInterval(()=>{
  const hour=new Date().getHours();
  if(hour>=18 || hour<=4){
    document.body.classList.add("night");
  }else{
    document.body.classList.remove("night");
  }
},60000);

// ================= KHATIB JUMAT =================
const jadwalKhatib = [
  {tanggal:"2026-03-06", nama:"Ust. Ahmad Fauzi"},
  {tanggal:"2026-03-13", nama:"KH. Abdul Karim"},
  {tanggal:"2026-03-20", nama:"Ust. Hanan Attaki"},
  {tanggal:"2026-03-27", nama:"Ust. Adi Hidayat"}
];

function cekJumat(){
  const today = new Date().toISOString().split("T")[0];
  const hari = new Date().getDay();

  if(hari === 5){
    const data = jadwalKhatib.find(j => j.tanggal === today);
    if(data){
      document.getElementById("jumat").innerText =
        "🕌 KHATIB JUMAT HARI INI: " + data.nama;
    }else{
      document.getElementById("jumat").innerText =
        "🕌 KHATIB JUMAT: Menunggu Konfirmasi";
    }
  }else{
    document.getElementById("jumat").innerText = "";
  }
}
setInterval(cekJumat, 60000);
cekJumat();

// ================= RUNNING TEXT =================
function updatePengumuman(){
  const teks = [
    "Selamat datang di Masjid Jami Al - Firdaus",
    "Matikan HP saat sholat",
    "Luruskan dan rapatkan shaf",
    "Jaga kebersihan masjid",
    "Infak terbaik adalah hari Jumat"
  ];
  document.getElementById("marquee").innerText =
    teks.join(" • ");
}
updatePengumuman();

</script>

</body>
</html>
